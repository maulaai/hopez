# HOPEZ.AI API server configuration
# Any value here can be overridden by an environment variable (see .env.example).
# Lines starting with # or ; are comments.

[server]
port           = 4000
body_limit     = 2mb
app_url        = http://localhost:5173

[auth]
jwt_secret         = change_me_to_a_long_random_string
jwt_ttl            = 7d
reset_ttl_minutes  = 30
bcrypt_cost        = 10

[openai]
# Either set OPENAI_API_KEY in .env, or paste the key here.
api_key   =
base_url  = https://api.openai.com/v1

[cors]
# Comma-separated list of allowed frontend origins.
allowed_origins = http://localhost:5173,http://localhost:3000

[rate_limit]
auth_window_ms   = 900000      ; 15 minutes
auth_max         = 30
proxy_window_ms  = 60000       ; 1 minute
proxy_max        = 120

[billing]
default_monthly_quota = 1000

[pool]
# Enables 1:1 dedicated upstream-key binding. When false, proxy falls back to
# the shared OPENAI_API_KEY (legacy mode).
enabled                = true
provider               = openai
min_size               = 300         ; alert if pool drops below this
cooldown_minutes       = 10          ; released keys wait this long before reuse
auto_release_on_revoke = true
default_one_time_use   = false       ; users can opt in per-key
default_ttl_minutes    = 1440        ; 24h, 0 = never expire
cooldown_sweep_ms      = 60000       ; how often to promote cooling_down -> available

[crypto]
# Master key is read from this environment variable. Never put the key in this file.
master_key_env         = HOPEZ_POOL_MASTER_KEY
algorithm              = aes-256-gcm

[admin]
# This email is auto-promoted to role=admin on signup or first login.
bootstrap_email        = admin@hopez.ai
