# HOPEZ.AI frontend configuration
# Override values via environment variables (see .env.example).

[server]
# Port the static frontend listens on.
port      = 5173
# Public base URL the frontend is served from (used for canonical links / SEO).
public_url = http://localhost:5173

[backend]
# Where to proxy /api/* and /v1/* requests so cookies stay first-party.
api_url   = http://localhost:4000

[branding]
product_name = HOPEZ.AI
support_email = support@hopez.ai
