<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Choose a new password — HOPEZ.AI</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body class="marketing">
  <div data-slot="header"></div>
  <main class="container">
    <div class="card card-narrow elevated">
      <h2 class="serif" style="font-family:var(--font-serif);font-weight:500;text-align:center;margin-bottom:6px">Choose a new password</h2>
      <p class="muted center" style="margin-bottom:20px">Enter a new password for your account.</p>
      <form id="f">
        <div class="field">
          <label class="label" for="password">New password</label>
          <input id="password" type="password" minlength="8" required autocomplete="new-password" />
          <div class="help">At least 8 characters.</div>
        </div>
        <button class="btn brand block" type="submit">Update password</button>
        <p class="success-text" id="ok"></p>
        <p class="error" id="err"></p>
      </form>
    </div>
  </main>
  <div data-slot="footer"></div>
  <script src="/assets/js/hopez.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = HZ.qs('token');
      const ok = document.getElementById('ok'), err = document.getElementById('err');
      ok.textContent = ''; err.textContent = '';
      if (!token) { err.textContent = 'Missing or invalid reset token.'; return; }
      try {
        await HZ.api.reset({ token, password: document.getElementById('password').value });
        ok.textContent = 'Password updated. Redirecting to sign in…';
        setTimeout(() => location.href = '/login', 1000);
      } catch (ex) { err.textContent = ex.message; }
    });
  </script>
</body>
</html>
