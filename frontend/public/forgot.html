<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset your password — HOPEZ.AI</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body class="marketing">
  <div data-slot="header"></div>
  <main class="container">
    <div class="card card-narrow elevated">
      <h2 class="serif" style="font-family:var(--font-serif);font-weight:500;text-align:center;margin-bottom:6px">Reset your password</h2>
      <p class="muted center" style="margin-bottom:20px">Enter your email and we'll send you a reset link.</p>
      <form id="f">
        <div class="field">
          <label class="label" for="email">Email</label>
          <input id="email" type="email" required autocomplete="email" />
        </div>
        <button class="btn brand block" type="submit">Send reset link</button>
        <p class="success-text" id="ok"></p>
        <p class="error" id="err"></p>
      </form>
      <div class="divider"></div>
      <p class="center muted" style="margin:0"><a href="/login">Back to sign in</a></p>
    </div>
  </main>
  <div data-slot="footer"></div>
  <script src="/assets/js/hopez.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script>
    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const ok = document.getElementById('ok'), err = document.getElementById('err');
      ok.textContent = ''; err.textContent = '';
      try {
        const r = await HZ.api.forgot({ email: document.getElementById('email').value.trim() });
        ok.textContent = 'If that email is registered, a reset link was sent.';
        if (r && r.dev_reset_url) {
          ok.innerHTML += `<br/><span class="muted" style="font-size:12px">Dev link: <a href="${r.dev_reset_url}">${r.dev_reset_url}</a></span>`;
        }
      } catch (ex) { err.textContent = ex.message; }
    });
  </script>
</body>
</html>
